services:
  - type: web
    name: huda-masjid-attendance
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMERGENCY_RESET_CODE
        sync: false
      - key: PORT
        value: 10000