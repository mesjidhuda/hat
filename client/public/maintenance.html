<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance – Huda Masjid</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Cairo:wght@500;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0d130d;
      --accent: #d4af37;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at top right, #2c5f2d 0%, transparent 40%);
      background-attachment: fixed;
      font-family: 'Outfit', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 450px;
      width: 100%;
    }
    .divider-container {
      display: flex; align-items: center; gap: 12px; margin-bottom: 25px;
    }
    .divider-container .line {
      flex: 1; height: 1px; background-color: var(--text-muted); opacity: 0.4;
    }
    .star-icon {
      width: 20px; height: 20px; fill: var(--accent);
      filter: drop-shadow(0 0 8px rgba(212,175,55,0.3));
    }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 25px;
      background: rgba(212,175,55,0.1); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--accent);
    }
    .icon svg {
      width: 40px; height: 40px; stroke: var(--accent); fill: none; stroke-width: 2;
    }
    h1 {
      font-family: 'Merriweather', serif;
      color: var(--accent);
      font-size: 1.8rem;
      margin-bottom: 10px;
    }
    .arabic-title {
      font-family: 'Cairo', sans-serif;
      color: var(--text-primary);
      font-size: 1.2rem;
      margin-bottom: 20px;
      opacity: 0.9;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    .footer-text {
      margin-top: 40px;
      font-family: 'Cairo', sans-serif;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .bottom-divider {
      margin-top: 30px; margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top Star Divider -->
    <div class="divider-container">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" class="star-icon">
        <path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" />
      </svg>
      <span class="line"></span>
    </div>

    <!-- Wrench Icon -->
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
      </svg>
    </div>

    <h1>Under Maintenance</h1>
    <div class="arabic-title">إدارة حلقة مسجد الهدى</div>
    <p>
      Huda Masjid Attendance Manager is currently undergoing scheduled maintenance.
    </p>
    <p style="font-size:0.85rem;opacity:0.7;">
      We'll be back shortly. Please check again in a few minutes.<br>
      Thank you for your patience.
    </p>

    <!-- Bottom Star Divider -->
    <div class="divider-container bottom-divider">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" class="star-icon">
        <path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" />
      </svg>
      <span class="line"></span>
    </div>

    <p class="footer-text">بسم الله الرحمن الرحيم</p>
  </div>
</body>
</html>
