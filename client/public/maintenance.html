<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance – Huda Masjid</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Cairo:wght@500;700&family=Merriweather:wght@700&display=swap" rel="stylesheet">
  <style>
    /* ========== YOUR ORIGINAL STYLES – COMPLETELY UNTOUCHED ========== */
    :root {
      --bg-dark: #0d130d;
      --accent: #d4af37;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at top right, #2c5f2d 0%, transparent 40%);
      background-attachment: fixed;
      font-family: 'Outfit', sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
      animation: bodyFadeIn 1.2s ease forwards;
    }

    @keyframes bodyFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .container {
      max-width: 450px;
      width: 100%;
      animation: slideUp 1s ease forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .divider-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .divider-container .line {
      flex: 1;
      height: 1px;
      background-color: var(--text-muted);
      opacity: 0.4;
    }

    .star-icon {
      width: 20px;
      height: 20px;
      fill: var(--accent);
      filter: drop-shadow(0 0 8px rgba(212,175,55,0.3));
      animation: starPulse 2s ease-in-out infinite;
    }

    @keyframes starPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 25px;
      background: rgba(212,175,55,0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--accent);
      position: relative;
      box-shadow: 0 0 15px rgba(212,175,55,0.2);
      animation: iconGlow 2.5s ease-in-out infinite;
    }

    @keyframes iconGlow {
      0%, 100% { box-shadow: 0 0 10px rgba(212,175,55,0.2); }
      50% { box-shadow: 0 0 25px rgba(212,175,55,0.5); }
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      animation: wrenchWiggle 2s ease-in-out infinite;
    }

    @keyframes wrenchWiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }

    h1 {
      font-family: 'Merriweather', serif;
      color: var(--accent);
      font-size: 1.8rem;
      margin-bottom: 10px;
    }

    .arabic-title {
      font-family: 'Cairo', sans-serif;
      color: var(--text-primary);
      font-size: 1.2rem;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 15px;
    }

    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 20px 0 10px 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: dotBounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .footer-text {
      margin-top: 40px;
      font-family: 'Cairo', sans-serif;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .bottom-divider {
      margin-top: 30px;
      margin-bottom: 5px;
    }

    .icon::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0.3;
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.1); opacity: 0.5; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .icon { width: 65px; height: 65px; }
      .icon svg { width: 32px; height: 32px; }
    }

    /* ========== NEW: FLAME SPARKLE EFFECT ========== */
    .sparkles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .flame-particle {
      position: absolute;
      bottom: -10px;
      width: 6px;
      height: 6px;
      background: #d4af37;
      border-radius: 50%;
      box-shadow: 0 0 10px #d4af37, 0 0 20px #f5a623;
      animation: rise linear infinite;
      opacity: 0;
    }

    /* some particles will be orange for flame-like variation */
    .flame-particle.orange {
      background: #f5a623;
      box-shadow: 0 0 10px #f5a623, 0 0 20px #ff8c00;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <!-- ====== FLAME SPARKLES ====== -->
  <div class="sparkles" id="sparklesContainer"></div>

  <div class="container">
    <!-- Top Star Divider -->
    <div class="divider-container">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" class="star-icon">
        <path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" />
      </svg>
      <span class="line"></span>
    </div>

    <!-- Wrench Icon with animated glow -->
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
      </svg>
    </div>

    <h1>Under Maintenance</h1>
    <div class="arabic-title">إدارة حلقة مسجد الهدى</div>

    <p>
      Huda Masjid Attendance Manager is currently undergoing scheduled maintenance.
    </p>

    <!-- Animated dots to indicate ongoing work -->
    <div class="loading-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p style="font-size:0.85rem;opacity:0.7;">
      We'll be back shortly. Please check again in a few minutes.<br>
      Thank you for your patience.
    </p>

    <!-- Bottom Star Divider -->
    <div class="divider-container bottom-divider">
      <span class="line"></span>
      <svg viewBox="0 0 24 24" class="star-icon">
        <path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" />
      </svg>
      <span class="line"></span>
    </div>

    <p class="footer-text">بسم الله الرحمن الرحيم</p>
  </div>

  <!-- ====== SCRIPT TO GENERATE FLAME PARTICLES ====== -->
  <script>
    (function() {
      const container = document.getElementById('sparklesContainer');
      const particleCount = 30; // number of simultaneous sparks

      function createParticle() {
        const particle = document.createElement('div');
        // randomly choose gold or orange for a flame‑like mix
        const isOrange = Math.random() > 0.5;
        particle.className = 'flame-particle' + (isOrange ? ' orange' : '');

        // random horizontal position
        particle.style.left = Math.random() * 100 + '%';

        // random size variation
        const size = Math.random() * 8 + 4; // 4‑12px
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';

        // random animation duration (6‑12s)
        const duration = Math.random() * 6 + 6;
        particle.style.animationDuration = duration + 's';

        // random delay so they don't all start at once
        const delay = Math.random() * 5;
        particle.style.animationDelay = delay + 's';

        // slight horizontal drift
        particle.style.setProperty('--drift', (Math.random() * 40 - 20) + 'px');

        container.appendChild(particle);

        // remove particle after its animation ends to avoid memory leaks
        setTimeout(() => {
          particle.remove();
        }, (duration + delay) * 1000 + 100);
      }

      // initial burst
      for (let i = 0; i < particleCount; i++) {
        createParticle();
      }

      // continuously create new particles
      setInterval(() => {
        createParticle();
      }, 400);
    })();
  </script>
</body>
</html>
